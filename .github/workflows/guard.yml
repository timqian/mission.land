name: guard

# Tamper-proof gate against CI-bypass PRs. It runs from the BASE branch via
# pull_request_target, so a PR canNOT neutralize it by editing or deleting
# workflow/verifier files in its own head — that is the whole attack this
# defends against (e.g. "delete verify.yml so nothing checks my record").
#
# It never checks out or runs PR code; it only inspects the list of changed
# files through the API, so running with base permissions is safe.
#
# Policy: an external contributor's PR may only add/modify the sanctioned
# contribution surfaces — a record (missions/<id>/records/*.json) or an attempt
# log (missions/<id>/attempts/*.md). Anything else (workflows, tools, verify.py,
# meta.json, mission.md, challenge/, ...) needs a maintainer, because those
# files define what counts as a valid submission. Maintainers are exempt.
on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: A record PR may only touch records/ or attempts/
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.number }}
          ASSOC: ${{ github.event.pull_request.author_association }}
        run: |
          set -euo pipefail

          # Maintainers may change anything (infra, new missions, verifiers).
          # author_association is set by GitHub from the real relationship, so it
          # can't be spoofed by a fork.
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR)
              echo "author_association=$ASSOC → trusted maintainer; guard skipped."
              exit 0 ;;
          esac

          # path <TAB> status <TAB> previous_filename (previous catches a rename
          # that tries to move a protected file onto an allowed path).
          rows="$(gh api --paginate "repos/$REPO/pulls/$PR/files" \
                   --jq '.[] | [.filename, .status, (.previous_filename // "")] | @tsv')"
          echo "Changed files (path / status / previous):"; printf '%s\n' "$rows"

          allowed='^missions/[^/]+/(records/[^/]+\.json|attempts/[^/]+\.md)$'
          fail=0
          while IFS="$(printf '\t')" read -r path status prev; do
            [ -n "$path" ] || continue
            if ! printf '%s' "$path" | grep -qE "$allowed"; then
              echo "::error::disallowed path: $path"; fail=1; continue
            fi
            # Records/attempts may only be added or edited — not removed or renamed
            # (blocks deleting a rival's record, or renaming a protected file in).
            case "$status" in
              added|modified) ;;
              *) echo "::error::disallowed change ($status) to $path"; fail=1 ;;
            esac
            if [ -n "$prev" ] && ! printf '%s' "$prev" | grep -qE "$allowed"; then
              echo "::error::rename from protected path: $prev"; fail=1
            fi
          done <<< "$rows"

          if [ "$fail" = 1 ]; then
            echo "::error::External submissions may only ADD a records/*.json record or attempts/*.md log."
            echo "::error::Editing workflows, tools, verify.py, meta.json, mission.md or challenge/ — or deleting records — needs a maintainer."
            exit 1
          fi
          echo "OK: PR only adds/edits records or attempts."
