name: verify-lean

# Proof missions are excluded from the fast stdlib verify workflow (their
# meta.json declares heavy tools); this workflow verifies them instead.
# When adding a new proof mission, add its path below.
on:
  pull_request:
    paths:
      - "missions/4-sqrt2-irrational/**"
      - "missions/5-erdos-straus/**"
      - "missions/6-vdw-theorem/**"
      - "missions/7-ramsey-theorem/**"
      - "tools/lean/**"
      - ".github/workflows/verify-lean.yml"
  push:
    branches: [main]
    paths:
      - "missions/4-sqrt2-irrational/**"
      - "missions/5-erdos-straus/**"
      - "missions/6-vdw-theorem/**"
      - "missions/7-ramsey-theorem/**"
      - "tools/lean/**"
      - ".github/workflows/verify-lean.yml"

permissions:
  contents: read

# Cancel a PR's older in-progress runs when it's pushed again; let main runs
# finish (a merge should always re-verify to completion).
concurrency:
  group: verify-lean-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    # Skip draft PRs — attempt logs shouldn't spin up the heavy Lean toolchain
    # (see skill.md). Pushes to main always run.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need history to diff a PR against its base

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lean toolchains
        uses: actions/cache@v4
        with:
          path: ~/.elan/toolchains
          key: elan-${{ hashFiles('missions/*/challenge/lean-toolchain') }}

      - name: Cache comparator build
        uses: actions/cache@v4
        with:
          path: ~/.cache/mission-land/comparator
          key: comparator-${{ hashFiles('tools/lean/comparator.lock') }}

      # The dominant cost isn't the proof — even the trivial √2 mission imports
      # Mathlib, so `lake exe cache get` re-fetches the whole Mathlib olean set on
      # every run unless the build dirs survive. Key by each mission's pinned
      # mathlib rev (lake-manifest) + toolchain; restore-keys warms from the last
      # cache so a cold key only fetches the delta. Scoping PRs to the changed
      # mission (below) keeps what lands on disk — and thus the cache — bounded.
      - name: Cache Mathlib build (oleans)
        uses: actions/cache@v4
        with:
          path: |
            missions/*/challenge/.lake
            ~/.cache/mathlib
          key: lean-lake-${{ hashFiles('missions/*/challenge/lake-manifest.json', 'missions/*/challenge/lean-toolchain') }}
          restore-keys: |
            lean-lake-

      - name: Install landrun (sandbox; best effort)
        run: |
          go install github.com/Zouuup/landrun@main \
            && echo "$HOME/go/bin" >> "$GITHUB_PATH" \
            || echo "::warning::landrun install failed — solutions build unsandboxed in this ephemeral runner"

      # On a PR, verify only the proof mission(s) whose files changed — a PR
      # touching mission 4 shouldn't rebuild 5/6/7. Shared tooling (tools/lean,
      # this workflow) or a push to main re-verifies every proof mission.
      - name: Select proof missions to verify
        id: select
        env:
          EVENT: ${{ github.event_name }}
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          list_all() {
            for d in missions/*/; do
              [ -f "${d}challenge/comparator-config.json" ] && printf '%s\n' "$d"
            done
          }
          if [ "$EVENT" = "pull_request" ]; then
            changed="$(git diff --name-only "$BASE" "$HEAD" || true)"
            if printf '%s\n' "$changed" | grep -qE '^(tools/lean/|\.github/workflows/verify-lean\.yml)'; then
              sel="$(list_all)"
            else
              sel=""
              for d in $(printf '%s\n' "$changed" | grep -oE '^missions/[^/]+/' | sort -u || true); do
                [ -f "${d}challenge/comparator-config.json" ] && sel="${sel}${d}"$'\n'
              done
            fi
          else
            sel="$(list_all)"
          fi
          {
            echo "missions<<EOF"
            printf '%s\n' "$sel"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Selected proof missions:"; printf '%s\n' "$sel"

      - name: Verify selected proof-mission records
        env:
          MISSIONS: ${{ steps.select.outputs.missions }}
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r d; do
            [ -n "$d" ] || continue
            [ -f "${d}challenge/comparator-config.json" ] || continue
            for r in "${d}"records/*.json; do
              found=1
              echo "::group::${r}"
              python3 "${d}verify.py" "$r"
              echo "::endgroup::"
            done
          done <<< "$MISSIONS"
          [ "$found" = "1" ] || echo "no proof missions to verify"
